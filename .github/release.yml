changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - semver-major
    - title: Features
      labels:
        - enhancement
        - feature
        - semver-minor
    - title: Fixes
      labels:
        - bug
        - fix
        - semver-patch
    - title: Adapter Support
      labels:
        - adapter
        - warehouse
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: CI And Maintenance
      labels:
        - ci
        - dependencies
        - maintenance
    - title: Other Changes
      labels:
        - "*"
