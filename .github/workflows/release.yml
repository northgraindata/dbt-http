name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Parse package
        run: uv run dbt parse --profiles-dir .

      - name: Run tests
        run: uv run pytest

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --fail-on-no-commits \
            --generate-notes \
            --title "${GITHUB_REF_NAME}" \
            --notes "dbt-http ${GITHUB_REF_NAME}: adapter-aware HTTP macros for dbt projects. This release includes generated changelog entries grouped by change type."
